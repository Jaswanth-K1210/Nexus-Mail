apiVersion: v1
kind: Namespace
metadata:
  name: nexus-mail
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-config
  namespace: nexus-mail
data:
  APP_NAME: "NexusMail"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://your-ec2-ip:8000"
  FRONTEND_URL: "http://your-ec2-ip"
  MONGODB_DATABASE: "nexus_mail"
  REDIS_URL: "redis://nexus-redis-service:6379/0"
  CORS_ORIGINS: "http://your-ec2-ip"
  AI_PROVIDER: "groq"
  AI_MODEL: "llama-3.3-70b-versatile"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-redis
  namespace: nexus-mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-redis
  template:
    metadata:
      labels:
        app: nexus-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-redis-service
  namespace: nexus-mail
spec:
  selector:
    app: nexus-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-backend
  namespace: nexus-mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-backend
  template:
    metadata:
      labels:
        app: nexus-backend
    spec:
      containers:
      - name: backend
        image: nexus-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: nexus-config
        - secretRef:
            name: nexus-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-backend-service
  namespace: nexus-mail
spec:
  selector:
    app: nexus-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-frontend
  namespace: nexus-mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-frontend
  template:
    metadata:
      labels:
        app: nexus-frontend
    spec:
      containers:
      - name: frontend
        image: nexus-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-frontend-service
  namespace: nexus-mail
spec:
  selector:
    app: nexus-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
